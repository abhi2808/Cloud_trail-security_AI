# ─────────────────────────────────────────────────────────────────
# CloudComply AI — Docker Compose
# Usage (local test):  docker compose up --build
# On EC2:              docker compose -f docker-compose.yml up -d
# ─────────────────────────────────────────────────────────────────
version: "3.9"

services:

  # ── FastAPI Backend ──────────────────────────────────────────
  backend:
    image: ${ECR_REGISTRY}/cloud-comply-inspector-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudcomply-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # DB
      MONGODB_URI:              ${MONGODB_URI}
      JWT_SECRET:               ${JWT_SECRET}
      JWT_EXPIRY_HOURS:         ${JWT_EXPIRY_HOURS:-24}
      ENCRYPTION_SECRET:        ${ENCRYPTION_SECRET}
      # AWS defaults
      AWS_REGION:               ${AWS_REGION:-ap-south-1}
      # Bedrock
      BEDROCK_ACCESS_KEY_ID:    ${BEDROCK_ACCESS_KEY_ID}
      BEDROCK_SECRET_ACCESS_KEY: ${BEDROCK_SECRET_ACCESS_KEY}
      BEDROCK_REGION:           ${BEDROCK_REGION:-ap-south-1}
      BEDROCK_MODEL_ID:         ${BEDROCK_MODEL_ID:-apac.anthropic.claude-3-5-sonnet-20241022-v2:0}
      # App
      PORT:                     8000
      CLIENT_URL:               ${CLIENT_URL}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── React Frontend (nginx) ───────────────────────────────────
  frontend:
    image: ${ECR_REGISTRY}/cloud-comply-inspector-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL:         ${VITE_API_URL:-http://localhost:8000}
        VITE_APP_SECRET_KEY:  ${VITE_APP_SECRET_KEY:-changeme}
        VITE_AWS_REGION:      ${VITE_AWS_REGION:-ap-south-1}
    container_name: cloudcomply-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
